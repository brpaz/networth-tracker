apiVersion: apps/v1
kind: Deployment
metadata:
  name: networth-tracker
  labels:
    app: networth-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: networth-tracker
  template:
    metadata:
      labels:
        app: networth-tracker
    spec:
      serviceAccountName: networth-tracker
      containers:
        - name: app
          image: ghcr.io/brpaz/networth-tracker:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: networth-tracker-config
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: networth-tracker-data
