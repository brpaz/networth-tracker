name: Feature Request
description: Suggest a new feature or improvement
labels: ['feature-request']
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Describe what you'd like to see and why it would be useful.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Is this related to a frustration or limitation you've hit?
      placeholder: I'm frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: What should the feature do? How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, examples from other apps, or anything else helpful.
    validations:
      required: false
