services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file: .env
    volumes:
      - app_data:/app/data
      - node_modules:/app/node_modules
      - nuxt:/app/.nuxt
      - .:/app
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:$${PORT:-3000}/api/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

volumes:
  app_data:
  node_modules:
  nuxt:
